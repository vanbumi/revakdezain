<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revakdezain - Instagram Square Ad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }
    #canvas {
      width: 1080px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      padding: 40px 50px 20px;
      position: relative;
    }
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, #ffffff08 1px, transparent 1px),
        linear-gradient(to bottom, #ffffff08 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 1;
    }
    .glow-orb {
      position: absolute;
      top: -120px;
      left: -120px;
      width: 500px;
      height: 500px;
      border-radius: 9999px;
      filter: blur(150px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb-2 {
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 350px;
      height: 350px;
      border-radius: 9999px;
      filter: blur(120px);
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .headline-text {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.15;
      text-align: center;
      max-width: 980px;
      margin: 0 auto;
    }
    .body-columns {
      display: flex;
      flex-direction: row;
      gap: 35px;
      flex: 1;
      align-items: center;
      margin-top: 5px;
      margin-bottom: 5px;
    }
    .left-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .right-column {
      width: 370px;
      height: 460px;
      border-radius: 20px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .right-column img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .right-column .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
    }
    .offer-text {
      font-size: 28px;
      line-height: 1.4;
      max-width: 520px;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }
    .urgency-badge {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      align-self: flex-start;
    }
    .cta-section {
      text-align: center;
      padding-top: 8px;
      padding-bottom: 3px;
    }
    .cta-text {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .watermark {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      font-weight: 500;
      letter-spacing: 1px;
      z-index: 2;
      padding-top: 3px;
    }
  </style>
</head>
<body class="m-0 p-0">
  <div id="canvas" style="background: linear-gradient(135deg, {{GRADIENT_FROM}}, {{GRADIENT_TO}});">

    <div class="grid-overlay"></div>
    <div class="glow-orb" style="background: {{WARNA_AKSEN_TEKS}};"></div>
    <div class="glow-orb-2" style="background: {{GRADIENT_FROM}};"></div>

    <div class="content">

      <!-- HEADLINE — Center Top -->
      <div class="text-center">
        <h1 id="headline-container" class="headline-text text-white mb-3">
          {{HEADLINE}}
        </h1>
      </div>

      <!-- BODY — 2 Kolom: Kiri Teks, Kanan Gambar -->
      <div class="body-columns">

        <!-- Kiri: Offer + Urgency -->
        <div class="left-column">
          <p class="offer-text">
            {{OFFER}}
          </p>
          <div class="urgency-badge" style="color: {{WARNA_AKSEN_TEKS}};">
            ⚡ {{URGENCY}}
          </div>
        </div>

        <!-- Kanan: Gambar Portrait dari Pexels atau placeholder -->
        <div class="right-column" id="image-column" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);">
          <div id="pexels-image-container">
            <!-- Akan diisi oleh JS di bawah -->
          </div>
        </div>

      </div>

      <!-- CTA SECTION -->
      <div class="cta-section">
        <p class="cta-text" style="color: {{WARNA_AKSEN_TEKS}};">
          {{CTA}}
        </p>
      </div>

      <div class="watermark">@revakdezain</div>

    </div>
  </div>

  <script>
    (function() {
      // === SETUP GAMBAR PEXELS ===
      var pexelsUrl = '{{PEXELS_IMAGE_URL}}';
      var container = document.getElementById('pexels-image-container');
      var col = document.getElementById('image-column');

      if (pexelsUrl && pexelsUrl.startsWith('http') && container) {
        container.innerHTML = '<img src="' + pexelsUrl + '" alt="Product Image" style="width:100%;height:100%;object-fit:cover;display:block;" />';
      } else if (col) {
        // Fallback: lingkaran abstrak sebagai placeholder
        col.style.background = 'rgba(255,255,255,0.06)';
        col.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;">'
          + '<div style="position:absolute;width:200px;height:200px;border-radius:50%;background:{{WARNA_AKSEN_TEKS}};opacity:0.15;filter:blur(40px);"></div>'
          + '<div style="position:absolute;width:120px;height:120px;border-radius:50%;background:{{GRADIENT_FROM}};opacity:0.2;filter:blur(20px);"></div>'
          + '<span style="position:relative;z-index:1;font-size:60px;opacity:0.7;">✨</span>'
          + '</div>';
      }

      // === PARSING AKSEN TEKS ===
      var headlineEl = document.getElementById('headline-container');
      if (headlineEl) {
        var kalimat = headlineEl.textContent || '';
        var kataKunci = '{{KATA_KUNCI_AKSEN}}'.trim();
        var warnaAksen = '{{WARNA_AKSEN_TEKS}}';

        if (kataKunci && warnaAksen) {
          var escaped = kataKunci.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          var regex = new RegExp('(' + escaped + ')', 'gi');
          var hasil = kalimat.replace(regex, '<span style="color: ' + warnaAksen + ';">$1</span>');
          headlineEl.innerHTML = hasil;
        }
      }
    })();
  </script>
</body>
</html>
